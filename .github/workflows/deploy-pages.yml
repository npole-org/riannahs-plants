name: deploy-pages

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      TARGET_PROJECT: ${{ github.ref_name == 'main' && 'riannahs-plants' || 'riannahs-plants-develop' }}
      VITE_API_BASE_URL: ${{ github.ref_name == 'main' && vars.VITE_API_BASE_URL_PROD || vars.VITE_API_BASE_URL_DEVELOP }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Validate API base URL wiring
        run: |
          if [ -z "$VITE_API_BASE_URL" ]; then
            echo "VITE_API_BASE_URL is not configured for branch ${{ github.ref_name }}."
            echo "Set repo variable VITE_API_BASE_URL_DEVELOP and/or VITE_API_BASE_URL_PROD."
            exit 1
          fi
          echo "Using API base URL host: $(echo "$VITE_API_BASE_URL" | sed -E 's#(https?://[^/]+).*#\1#')"

      - name: Build web app
        working-directory: apps/web
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/dist --project-name=${{ env.TARGET_PROJECT }} --branch=${{ github.ref_name }} --commit-dirty=true
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  deployed-login-smoke:
    needs: deploy
    runs-on: ubuntu-latest
    if: github.ref_name == 'develop'
    defaults:
      run:
        working-directory: apps/web
    env:
      PLAYWRIGHT_BASE_URL: https://riannahs-plants-develop.pages.dev
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run deployed login smoke test
        run: npx playwright test tests/e2e/login-deployed.spec.js --reporter=line
