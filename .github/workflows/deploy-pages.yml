name: deploy-pages

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    outputs:
      api_base_url: ${{ steps.resolve-url.outputs.api_base_url }}
    env:
      WORKER_ENV: ${{ github.ref_name == 'main' && 'production' || '' }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve D1 binding and apply remote migration
        id: d1-binding
        run: |
          npm install -g wrangler@4

          if [ "$WORKER_ENV" = "production" ]; then
            DB_NAME="riannahs-plants-prod"
          else
            DB_NAME="riannahs-plants-dev"
          fi

          db_id=$(wrangler d1 list --json | jq -r --arg name "$DB_NAME" '.[] | select(.name == $name) | .uuid' | head -n 1)

          if [ -z "$db_id" ]; then
            echo "D1 database '$DB_NAME' not found. Creating it..."
            create_output=$(wrangler d1 create "$DB_NAME" 2>&1 | tee /tmp/wrangler-d1-create.log)
            db_id=$(echo "$create_output" | grep -Eo '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -n 1)
          fi

          if [ -z "$db_id" ] || [ "$db_id" = "null" ]; then
            echo "Failed to resolve D1 database ID for '$DB_NAME'."
            exit 1
          fi

          echo "Resolved $DB_NAME => $db_id"

          DB_NAME="$DB_NAME" DB_ID="$db_id" WORKER_ENV="$WORKER_ENV" python - <<'PY'
          import os
          import pathlib
          import re

          source = pathlib.Path("apps/api/wrangler.toml").read_text()
          worker_env = os.environ.get("WORKER_ENV", "")
          db_name = os.environ["DB_NAME"]
          db_id = os.environ["DB_ID"]

          if worker_env == "production":
              pattern = r'(\[\[env\.production\.d1_databases\]\]\s*binding\s*=\s*"DB"\s*database_name\s*=\s*"' + re.escape(db_name) + r'"\s*database_id\s*=\s*")[^"]+(")'
          else:
              pattern = r'(\[\[d1_databases\]\]\s*binding\s*=\s*"DB"\s*database_name\s*=\s*"' + re.escape(db_name) + r'"\s*database_id\s*=\s*")[^"]+(")'

          replacement = r'\g<1>' + db_id + r'\2'
          updated, count = re.subn(pattern, replacement, source, count=1, flags=re.S)
          if count != 1:
              raise SystemExit("Unable to update wrangler.toml D1 binding for deployment.")

          pathlib.Path("apps/api/wrangler.ci.toml").write_text(updated)
          PY

          wrangler d1 execute "$DB_NAME" --remote --file=apps/api/migrations/0001_init.sql --config=apps/api/wrangler.ci.toml

      - name: Deploy API worker and capture URL
        id: resolve-url
        run: |
          deploy_cmd=(wrangler deploy --config=apps/api/wrangler.ci.toml)
          if [ -n "$WORKER_ENV" ]; then
            deploy_cmd+=(--env "$WORKER_ENV")
          fi

          deploy_output="$(${deploy_cmd[@]} 2>&1 | tee /tmp/wrangler-deploy.log)"
          api_base_url=$(echo "$deploy_output" | grep -Eo 'https://[a-zA-Z0-9._-]+\.workers\.dev' | head -n 1)

          if [ -z "$api_base_url" ]; then
            echo "Failed to detect workers.dev URL from wrangler deploy output"
            echo "--- wrangler output ---"
            cat /tmp/wrangler-deploy.log
            exit 1
          fi

          echo "api_base_url=$api_base_url" >> "$GITHUB_OUTPUT"
          echo "Using API base URL host: $api_base_url"

  deploy:
    needs: deploy-api
    runs-on: ubuntu-latest
    env:
      TARGET_PROJECT: ${{ github.ref_name == 'main' && 'riannahs-plants' || 'riannahs-plants-develop' }}
      VITE_API_BASE_URL: ${{ needs.deploy-api.outputs.api_base_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Validate API base URL wiring
        run: |
          if [ -z "$VITE_API_BASE_URL" ]; then
            echo "VITE_API_BASE_URL could not be derived for branch ${{ github.ref_name }}."
            exit 1
          fi
          echo "Using API base URL host: $(echo "$VITE_API_BASE_URL" | sed -E 's#(https?://[^/]+).*#\1#')"

      - name: Build web app
        working-directory: apps/web
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/dist --project-name=${{ env.TARGET_PROJECT }} --branch=${{ github.ref_name }} --commit-dirty=true
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  deployed-login-smoke:
    needs: [deploy, deploy-api]
    runs-on: ubuntu-latest
    if: github.ref_name == 'develop'
    defaults:
      run:
        working-directory: apps/web
    env:
      PLAYWRIGHT_BASE_URL: https://riannahs-plants-develop.pages.dev
      API_BASE_URL: ${{ needs.deploy-api.outputs.api_base_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run deployed login smoke test
        run: npx playwright test tests/e2e/login-deployed.spec.js --reporter=line
