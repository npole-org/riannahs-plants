name: deploy-pages

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    outputs:
      api_base_url: ${{ steps.resolve-url.outputs.api_base_url }}
    env:
      WORKER_NAME: riannahs-plants-api
      WORKER_ENV: ${{ github.ref_name == 'main' && 'production' || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Worker URL
        id: resolve-url
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          subdomain=$(curl -fsS "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/subdomain" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" | jq -r '.result.subdomain')

          if [ -z "$subdomain" ] || [ "$subdomain" = "null" ]; then
            echo "Unable to resolve workers.dev subdomain for account $CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi

          if [ -n "$WORKER_ENV" ]; then
            api_base_url="https://$WORKER_ENV.$WORKER_NAME.$subdomain.workers.dev"
          else
            api_base_url="https://$WORKER_NAME.$subdomain.workers.dev"
          fi

          echo "api_base_url=$api_base_url" >> "$GITHUB_OUTPUT"
          echo "Using API base URL host: $api_base_url"

      - name: Deploy API worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config=apps/api/wrangler.toml ${{ github.ref_name == 'main' && '--env production' || '' }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: deploy-api
    runs-on: ubuntu-latest
    env:
      TARGET_PROJECT: ${{ github.ref_name == 'main' && 'riannahs-plants' || 'riannahs-plants-develop' }}
      VITE_API_BASE_URL: ${{ needs.deploy-api.outputs.api_base_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Validate API base URL wiring
        run: |
          if [ -z "$VITE_API_BASE_URL" ]; then
            echo "VITE_API_BASE_URL could not be derived for branch ${{ github.ref_name }}."
            exit 1
          fi
          echo "Using API base URL host: $(echo "$VITE_API_BASE_URL" | sed -E 's#(https?://[^/]+).*#\1#')"

      - name: Build web app
        working-directory: apps/web
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/dist --project-name=${{ env.TARGET_PROJECT }} --branch=${{ github.ref_name }} --commit-dirty=true
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  deployed-login-smoke:
    needs: deploy
    runs-on: ubuntu-latest
    if: github.ref_name == 'develop'
    defaults:
      run:
        working-directory: apps/web
    env:
      PLAYWRIGHT_BASE_URL: https://riannahs-plants-develop.pages.dev
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run deployed login smoke test
        run: npx playwright test tests/e2e/login-deployed.spec.js --reporter=line
