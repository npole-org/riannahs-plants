name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure required docs exist
        run: |
          test -f README.md
          test -f docs/PLAN.md
          test -f docs/adrs/ADR-0001-cloudflare-native-stack.md
